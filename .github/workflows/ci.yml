 name: Elixir CI
 
 on:
   push:
     branches: ["main"]
   pull_request:
     branches: ["main"]
 
 permissions:
   contents: read
 
 jobs:
   ci:
     runs-on: ubuntu-latest
     env:
       MIX_ENV: test
     steps:
       - name: Checkout
         uses: actions/checkout@v4
 
       - name: Setup Elixir
         uses: erlef/setup-beam@v1
         with:
           elixir-version: '1.18.4'
           otp-version: '28.4'
 
       - name: Cache deps
         uses: actions/cache@v4
         with:
           path: |
             deps
             _build
           key: ${{ runner.os }}-mix-1.18.4-28.4-${{ hashFiles('**/mix.lock') }}
           restore-keys: ${{ runner.os }}-mix-1.18.4-28.4-
 
       - name: Install dependencies
         run: mix deps.get
 
       - name: Check formatting
         run: mix format --check-formatted
 
       - name: Compile
         run: mix compile --warnings-as-errors
 
       - name: Run Credo
         run: mix credo --strict
 
       - name: Run tests
         run: mix test
